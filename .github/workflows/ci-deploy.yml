name: CI & Deploy

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Type check
        run: npm run typecheck

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Resolve Cloudflare credentials
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN != '' && secrets.CLOUDFLARE_API_TOKEN || vars.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID != '' && secrets.CLOUDFLARE_ACCOUNT_ID || vars.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CF_API_TOKEN" ]; then
            echo "CLOUDFLARE_API_TOKEN is missing (checked secrets + vars, repo/env)." >&2
            exit 1
          fi
          if [ -z "$CF_ACCOUNT_ID" ]; then
            echo "CLOUDFLARE_ACCOUNT_ID is missing (checked secrets + vars, repo/env)." >&2
            exit 1
          fi
          echo "CLOUDFLARE_API_TOKEN=$CF_API_TOKEN" >> $GITHUB_ENV
          echo "CLOUDFLARE_ACCOUNT_ID=$CF_ACCOUNT_ID" >> $GITHUB_ENV

      - name: Deploy to Cloudflare Workers
        run: npx wrangler deploy
